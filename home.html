<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./assets/github-logo.png" type="image/png">
    <title>GitHub Issues Tracker</title>
</head>
<body class="py-6 px-4 md:px-10 lg:px-20 bg-gray-50 font-['Geist']">
  
  <header>
    <div class="flex flex-col md:flex-row md:items-center gap-4 mb-6 bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex items-center gap-3 justify-center md:justify-start">
        <img class="w-8 h-8 md:w-10 md:h-10" src="./assets/github-logo.png" alt="GitHub Logo">
        <h1 class="font-bold text-xl md:text-2xl text-gray-800">Issues Tracker</h1>
      </div>
      
      <div class="flex flex-col sm:flex-row flex-1 items-center gap-3 w-full md:justify-end">
        <label class="input input-bordered flex items-center gap-2 w-full max-w-none md:max-w-xs h-11">
          <svg class="h-4 w-4 opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></g></svg>
          <input id="btn-search" class="grow" type="search" placeholder="Search issues..." />
        </label>
        <button id="newIssueBtn" class="btn btn-primary w-full sm:w-auto h-11 min-h-0">
            <i class="fa-solid fa-plus"></i> New issue
        </button>
      </div>
    </div>
  </header>

  <section class="mb-6">
    <div class="flex gap-2 bg-white p-3 md:p-4 rounded-xl shadow-sm border border-gray-100 overflow-x-auto whitespace-nowrap justify-center md:justify-start">
        <button id="tab-all" onclick="switchTab('all')" class="cursor-pointer px-6 py-2 rounded-lg border border-gray-200 text-sm font-semibold transition-all hover:bg-gray-50">All</button>
        <button id="tab-open" onclick="switchTab('open')" class="cursor-pointer px-6 py-2 rounded-lg border border-gray-200 text-sm font-semibold transition-all hover:bg-gray-50">Open</button>
        <button id="tab-closed" onclick="switchTab('closed')" class="cursor-pointer px-6 py-2 rounded-lg border border-gray-200 text-sm font-semibold transition-all hover:bg-gray-50">Closed</button>
    </div>
</section>

<section id="all-container">
  <section id="issue-header"> 
    <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col sm:flex-row items-center justify-between gap-4 mt-4">
      
      <div class="flex items-center gap-4 w-full sm:w-auto justify-center md:justify-start">
        <img class="w-10 h-10 md:w-12 md:h-12 flex-shrink-0" src="./assets/Aperture.png" alt="aperture logo">
        
        <div class="flex flex-col text-left">
          <p class="font-bold text-xl md:text-2xl text-gray-800"><span id="issue-count">0</span> Issues</p>
          <p class="text-gray-500 text-xs md:text-sm">Manage your project progress</p>
        </div>
      </div>
      
      <div class="flex items-center gap-6 bg-gray-50 px-6 py-2 rounded-lg w-full sm:w-auto justify-center sm:justify-end">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-[#0DA76C] rounded-full"></span>
          <span class="font-bold text-xs text-gray-600 uppercase tracking-wider">Open</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-[#A855F7] rounded-full"></span>
          <span class="font-bold text-xs text-gray-600 uppercase tracking-wider">Closed</span>
        </div>
      </div>
    </div>
  </section>
</section>

<section id="details-area" class="mt-8">
    <div id="level-details-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
    </div>
</section>

<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box p-6 md:p-8 max-w-2xl" id="details-view-container">
  </div>
</dialog>
<dialog id="new_issue_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box p-6 md:p-8 max-w-lg">
    <h3 class="font-bold text-2xl mb-4 text-gray-800 border-b pb-2">Submit New Issue</h3>
    <form id="issue-submit-form" class="space-y-4">
      <div>
        <label class="label font-bold text-sm text-gray-700">Username</label>
        <input id="form-username" type="text" placeholder="Your Name" class="input input-bordered w-full" required />
      </div>
      <div>
        <label class="label font-bold text-sm text-gray-700">Password</label>
        <input id="form-password" type="password" placeholder="Password" class="input input-bordered w-full" required />
      </div>
      <div>
        <label class="label font-bold text-sm text-gray-700">Describe Your Issue</label>
        <textarea id="form-comment" class="textarea textarea-bordered w-full h-32" placeholder="Write your problem here..." required></textarea>
      </div>
      
      <div class="modal-action">
        <button type="submit" id="submit-btn" class="btn btn-primary px-8 font-bold">Submit Issue</button>
        <button type="button" onclick="new_issue_modal.close()" class="btn btn-ghost">Cancel</button>
      </div>
    </form>
  </div>
</dialog>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script type="text/javascript">
   (function(){
      // YOUR_PUBLIC_KEY এর জায়গায় আসল কী বসান
      emailjs.init("YOUR_PUBLIC_KEY"); 
   })();
</script>
<script src="./js/home.js"></script>
</body>
</html>
