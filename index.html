<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./assets/github-logo.png" type="image/png">
    <title>GitHub Issues Tracker</title>
</head>
<body class="font-['Geist']">

 <section class="px-4 py-6 md:py-10 flex justify-center items-center min-h-screen bg-gray-50">
    <div class="w-[95%] sm:w-full md:max-w-[500px] shadow-2xl rounded-2xl flex flex-col items-center gap-6 m-auto p-6 md:p-10 bg-white border border-gray-100">
        
        <div class="text-center space-y-2">
            <img class="mx-auto w-16 h-16 md:w-20 md:h-20" src="./assets/github-logo.png" alt="GitHub Logo">
            <h1 class="text-xl md:text-3xl font-bold text-gray-800 tracking-tight">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm md:text-base font-medium">Sign in to manage your issues</p>
        </div>

        <div class="w-full">
            <fieldset class="fieldset w-full space-y-4 p-0">
                
                <div class="w-full">
                    <label class="label font-bold text-xs md:text-sm text-gray-700 mb-1">Username</label>
                    <input id="username" type="text" class="input input-bordered w-full h-11 md:h-12 focus:border-primary" placeholder="Enter Username" />
                    <p class="text-purple-600 text-[10px] md:text-xs mt-1 font-medium italic">Default: admin</p>
                </div>
                
                <div class="w-full">
                    <label class="label font-bold text-xs md:text-sm text-gray-700 mb-1">Password</label>
                    <input id="username-password" type="password" class="input input-bordered w-full h-11 md:h-12 focus:border-primary" placeholder="Enter Password" />
                    <p class="text-purple-600 text-[10px] md:text-xs mt-1 font-medium italic">Default: admin123</p>
                </div>
                
                <button id="login-btn" class="btn btn-primary w-full mt-4 h-11 md:h-12 text-base md:text-lg font-bold">Sign In</button>
            </fieldset>
        </div>

        <div class="flex items-center w-full my-1">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="text-gray-400 font-bold tracking-widest uppercase mx-3 text-[10px] md:text-xs">OR</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <div class="w-full space-y-3">
            <p class="text-gray-500 text-center font-medium text-xs md:text-sm">Demo Credentials:</p>
            <div class="text-center bg-gray-50 p-4 md:p-5 rounded-xl w-full border border-dashed border-gray-300">
                <p class="text-xs md:text-sm font-bold text-gray-700">Username: <span class="text-gray-500 font-normal">admin</span></p>
                <p class="text-xs md:text-sm font-bold text-gray-700">Password: <span class="text-gray-500 font-normal">admin123</span></p>
            </div>
        </div>
    </div>
</section>

    <script src="./js/login.js"></script>
</body>
</html>
